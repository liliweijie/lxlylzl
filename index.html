<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LXLYLZL — 平面设计师 / Graphic Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--card:#151515;--card-border:rgba(255,255,255,.06);
  --cream:#f0ece4;--dim:rgba(255,255,255,.45);--faint:rgba(255,255,255,.12);
  --accent:#FF3A5C;--accent2:#00E0FF;--accent3:#B8FF57;
  --display:'Syne','Noto Sans SC',sans-serif;
  --body:'Space Grotesk','Noto Sans SC',sans-serif;
  --sidebar-collapsed:56px;
  --sidebar-expanded:220px;
  --transition:0.38s cubic-bezier(.65,0,.25,1);
}
html,body{height:100%;font-family:var(--body);background:var(--bg);color:var(--cream);overflow:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* ══════ BACKGROUND ══════ */
.bg-fixed{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:#ffffff}

/* ══════ LAYOUT ══════ */
.layout{
  display:flex;height:100vh;position:relative;z-index:1;
  justify-content:center;align-items:center;
}

.content-wrapper{
  display:flex;gap:1rem;
  width:calc(100vw * 0.875);height:calc(100vh * 0.875);
}

/* ══════ SIDEBAR (LEFT, VERTICAL) ══════ */
.sidebar{
  position:relative;z-index:10;
  width:var(--sidebar-collapsed);height:100%;
  background:var(--card);border:1px solid var(--card-border);
  border-radius:20px;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width var(--transition);
  flex-shrink:0;
}
.sidebar:hover{width:var(--sidebar-expanded)}

/* Logo */
.sidebar-logo{
  display:flex;align-items:center;gap:10px;
  padding:0 12px;height:72px;
  border-bottom:1px solid var(--card-border);
  flex-shrink:0;white-space:nowrap;
}
.logo-icon{
  width:28px;height:28px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 12px rgba(255,58,92,.25);
}
.logo-icon svg{width:16px;height:16px}
.logo-text{
  font-family:var(--display);font-weight:800;font-size:1rem;
  letter-spacing:.05em;text-transform:uppercase;
  opacity:0;transform:translateX(-8px);
  transition:opacity .25s .15s,transform .3s .1s;
  pointer-events:none;color:var(--cream);
}
.sidebar:hover .logo-text{opacity:1;transform:translateX(0)}

/* Nav */
.nav-section{
  flex:1;display:flex;flex-direction:column;
  gap:2px;padding:8px;
  overflow:hidden;
}
.nav-item{
  position:relative;display:flex;align-items:center;gap:10px;
  padding:0 12px;height:48px;border-radius:10px;
  cursor:pointer;white-space:nowrap;
  transition:background .2s,color .2s;user-select:none;
}
.nav-item:hover{background:rgba(255,255,255,.05)}
.nav-item.active{background:rgba(255,58,92,.12);color:var(--accent)}
.nav-item.active .nav-icon{color:var(--accent);filter:drop-shadow(0 0 5px rgba(255,58,92,.4))}
.nav-icon{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--dim);transition:color .2s,filter .2s;
}
.nav-icon svg{width:18px;height:18px}
.nav-item:hover .nav-icon{color:var(--cream)}
.nav-label{
  font-size:13.5px;font-weight:500;letter-spacing:.01em;
  opacity:0;transform:translateX(-8px);
  transition:opacity .22s,transform .28s;
  pointer-events:none;flex:1;
}
.sidebar:hover .nav-label{opacity:1;transform:translateX(0)}
.nav-item:nth-child(1) .nav-label{transition-delay:.07s}
.nav-item:nth-child(2) .nav-label{transition-delay:.10s}
.nav-item:nth-child(3) .nav-label{transition-delay:.13s}
.nav-item:nth-child(4) .nav-label{transition-delay:.16s}

/* Tooltip when collapsed */
.nav-tooltip{
  position:absolute;left:calc(var(--sidebar-collapsed) + 8px);top:50%;
  transform:translateY(-50%);
  background:#1e1e2e;border:1px solid var(--card-border);
  color:var(--cream);font-size:12px;font-weight:500;
  padding:5px 10px;border-radius:7px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .15s;
  z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.nav-item:hover .nav-tooltip{opacity:1}
.sidebar:hover .nav-tooltip{opacity:0!important}

/* Bottom */
.sidebar-bottom{
  padding:8px;
  display:flex;flex-direction:column;gap:2px;flex-shrink:0;
}
.nav-divider{width:calc(100% - 16px);height:1px;background:var(--card-border);margin:0 8px;flex-shrink:0}

.avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#f7a06d,#f76d8d);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}

/* ══════ MAIN AREA ══════ */
.main{
  flex:1;height:100%;
  overflow:hidden;position:relative;
  background:var(--card);border:1px solid var(--card-border);
  border-radius:20px;
}

/* ══════ PAGES (horizontal scroll) ══════ */
.pages-wrapper{
  width:100%;height:100%;
  display:flex;flex-direction:row;
  overflow-x:auto;overflow-y:hidden;
  scroll-behavior:auto; /* instant scroll for smooth loop */
}
.pages-wrapper::-webkit-scrollbar{height:0} /* hide scrollbar */

/* ══════ PAGE ══════ */
.page{
  width:calc(100% - 2rem);height:100%;
  display:flex;align-items:center;justify-content:center;
  padding:0 1rem;
  flex-shrink:0;
  margin:1rem;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:20px;
}
.card{
  width:100%;max-width:1200px;
  padding:2rem;
  position:relative;overflow:hidden;
}
.card::-webkit-scrollbar{width:4px}
.card::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ══════ SUB-SCROLL PAGES (WORKS & WENCHUANG) ══════ */
.page.has-subscroll .card {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-bottom: 0;
}
.card-scroll-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}
.scroll-track {
  flex: 1;
  overflow-y: auto;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  padding-right: 2rem; /* compensate for card padding */
  margin-right: -2rem;
}
.scroll-track::-webkit-scrollbar{width:3px}
.scroll-track::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.scroll-content{min-height:0;flex:1;display:flex;flex-direction:column}
.row-group{
  flex-shrink:0;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:1.2rem;
  margin-bottom:1.2rem;
}
/* Row 4 has 3 cards → span 3 columns */
.row-group:has(.wc-card:nth-child(3)){grid-template-columns:repeat(3,1fr)}

/* Fade indicators */
.subscroll-fade {
  position: absolute;
  left: 0; right: 0;
  height: 60px;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  transition: opacity .3s;
}
.subscroll-fade.top { top: 0; background: linear-gradient(to bottom, var(--card), transparent); }
.subscroll-fade.bottom { bottom: 36px; background: linear-gradient(to top, var(--card), transparent); }
.page.has-subscroll.subscroll-top .subscroll-fade.top,
.page.has-subscroll.subscroll-bottom .subscroll-fade.bottom { opacity: 1 }

/* Page dot indicators */
.page-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px 0 14px;
  flex-shrink: 0;
}
.page-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  transition: all .3s;
  cursor: pointer;
}
.page-dot.active {
  background: var(--accent);
  transform: scale(1.4);
}

/* ══════ HERO / CONTACT CARD — 不捕获滚轮，让父级处理 ══════ */
.page.is-hero .card,
.page.is-contact .card {
  overflow: visible;
}

/* card glow */
.card::before{
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3;
}

/* ══════ PAGE 0: HERO ══════ */
.hero-card{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-tag{font-size:.72rem;font-weight:600;letter-spacing:.35em;text-transform:uppercase;color:var(--accent2);margin-bottom:2rem}
.hero-name{font-family:var(--display);font-weight:800;font-size:clamp(3rem,8vw,6rem);line-height:.95;letter-spacing:-.03em;margin-bottom:1.5rem}
.hero-name .outline{-webkit-text-stroke:1.5px var(--cream);-webkit-text-fill-color:transparent}
.hero-role{font-size:1rem;color:var(--dim);margin-bottom:.6rem;font-weight:300;letter-spacing:.05em}
.hero-email{font-size:.9rem;color:var(--accent2);margin-bottom:2.5rem;transition:color .3s}
.hero-email:hover{color:var(--accent)}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.9rem 2rem;border-radius:999px;
  font-family:var(--body);font-size:.75rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.btn-fill{background:var(--accent);color:#fff}
.btn-fill:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,58,92,.3)}
.btn-ghost{background:transparent;color:var(--cream);border:1px solid rgba(255,255,255,.15)}
.btn-ghost:hover{border-color:var(--accent2);color:var(--accent2)}

/* ══════ PAGE 1: WORKS — Case Study ══════ */
.works-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2rem}
.works-header h2{font-family:var(--display);font-weight:700;font-size:clamp(1.8rem,3.5vw,2.8rem)}
.works-header .num{font-family:var(--display);font-size:3.5rem;font-weight:800;color:rgba(255,255,255,.04)}

.works-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem}

.work-card{
  border-radius:16px;position:relative;
  background:var(--card);border:1px solid var(--card-border);
  overflow:hidden;cursor:pointer;
  transition:border-color .35s,transform .3s,box-shadow .35s;
}
.work-card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}

/* cover area */
.work-cover{
  width:100%;aspect-ratio:16/9;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.work-cover .cover-ph{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  opacity:.08;
}
.cover-ph .sh{width:50px;height:50px;border:2px solid currentColor;border-radius:12px;transform:rotate(45deg)}
.cover-ph span{font-family:var(--display);font-weight:700;font-size:1.2rem;letter-spacing:.08em}
.work-card:nth-child(1) .work-cover{background:linear-gradient(135deg,#1a0a0f,#0a1520)}
.work-card:nth-child(1) .cover-ph{color:var(--accent)}
.work-card:nth-child(2) .work-cover{background:linear-gradient(135deg,#001520,#0a0a1a)}
.work-card:nth-child(2) .cover-ph{color:var(--accent2)}
.work-card:nth-child(3) .work-cover{background:linear-gradient(135deg,#0a150a,#0a1a0a)}
.work-card:nth-child(3) .cover-ph{color:var(--accent3)}
.work-card:nth-child(4) .work-cover{background:linear-gradient(135deg,#0f0a1a,#1a0a20)}
.work-card:nth-child(4) .cover-ph{color:#c084fc}
.work-card:nth-child(5) .work-cover{background:linear-gradient(135deg,#1a0a0f,#0a1520)}
.work-card:nth-child(5) .cover-ph{color:var(--accent)}
.work-card:nth-child(6) .work-cover{background:linear-gradient(135deg,#001520,#0a0a1a)}
.work-card:nth-child(6) .cover-ph{color:var(--accent2)}
.work-card:nth-child(7) .work-cover{background:linear-gradient(135deg,#0a150a,#0a1a0a)}
.work-card:nth-child(7) .cover-ph{color:var(--accent3)}
.work-card:nth-child(8) .work-cover{background:linear-gradient(135deg,#0f0a1a,#1a0a20)}
.work-card:nth-child(8) .cover-ph{color:#c084fc}

/* case study content */
.work-body{padding:1.5rem}

.work-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.8rem}
.work-id{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-top:2px}
.work-arrow{font-size:1.2rem;color:var(--dim);transition:all .3s;opacity:0}
.work-card:hover .work-arrow{opacity:1;color:var(--accent2);transform:translate(3px,-3px)}

.work-title{font-family:var(--display);font-weight:700;font-size:1.2rem;line-height:1.2;margin-bottom:.6rem}
.work-about{font-size:.8rem;line-height:1.7;color:var(--dim);margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.work-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.work-tag{
  font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  padding:.25rem .6rem;border-radius:999px;
  border:1px solid rgba(255,255,255,.1);color:var(--dim);
  transition:all .3s;
}
.work-card:hover .work-tag{border-color:rgba(255,255,255,.15)}
.work-tag.accent{background:rgba(255,58,92,.1);border-color:rgba(255,58,92,.3);color:var(--accent)}
.work-tag.accent2{background:rgba(0,224,255,.08);border-color:rgba(0,224,255,.25);color:var(--accent2)}
.work-tag.accent3{background:rgba(184,255,87,.08);border-color:rgba(184,255,87,.25);color:var(--accent3)}
.work-tag.purple{background:rgba(192,132,252,.08);border-color:rgba(192,132,252,.25);color:#c084fc}

/* ══════ PAGE 2: BLOG ══════ */
.blog-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2rem}
.blog-header h2{font-family:var(--display);font-weight:700;font-size:clamp(1.8rem,3.5vw,2.8rem)}
.blog-header .num{font-family:var(--display);font-size:3.5rem;font-weight:800;color:rgba(255,255,255,.04)}
.blog-list{max-height:calc(100vh - 220px);overflow-y:auto;padding-right:.5rem}
.blog-list::-webkit-scrollbar{width:4px}
.blog-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.blog-empty{text-align:center;padding:4rem 2rem;color:var(--dim);font-size:1.1rem}
.blog-post{margin-bottom:1.5rem;padding:1.5rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;cursor:pointer;transition:all .3s}
.blog-post:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);transform:translateX(4px)}
.blog-post-date{font-size:.75rem;color:var(--dim);margin-bottom:.5rem;letter-spacing:.05em}
.blog-post-title{font-family:var(--display);font-size:1.25rem;font-weight:600;margin-bottom:.75rem;line-height:1.4}
.blog-post-excerpt{font-size:.9rem;color:var(--dim);line-height:1.6}

/* ══════ PAGE 3: WENCHUANG — Case Study ══════ */
.wenchuang-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2rem}
.wenchuang-header h2{font-family:var(--display);font-weight:700;font-size:clamp(1.8rem,3.5vw,2.8rem)}
.wenchuang-header .num{font-family:var(--display);font-size:3.5rem;font-weight:800;color:rgba(255,255,255,.04)}

.wc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem}

.wc-card{
  border-radius:16px;position:relative;
  background:var(--card);border:1px solid var(--card-border);
  overflow:hidden;cursor:pointer;
  transition:border-color .35s,transform .3s,box-shadow .35s;
}
.wc-card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}

.wc-cover{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.wc-card:nth-child(1) .wc-cover{background:linear-gradient(135deg,#1a0a0f,#0a1520)}
.wc-card:nth-child(2) .wc-cover{background:linear-gradient(135deg,#001520,#0a0a1a)}
.wc-card:nth-child(3) .wc-cover{background:linear-gradient(135deg,#0a150a,#0a1a0a)}
.wc-card:nth-child(4) .wc-cover{background:linear-gradient(135deg,#0f0a1a,#1a0a20)}
.wc-card:nth-child(5) .wc-cover{background:linear-gradient(135deg,#1a0a0f,#0a1520)}
.wc-card:nth-child(6) .wc-cover{background:linear-gradient(135deg,#001520,#0a0a1a)}
.wc-card:nth-child(7) .wc-cover{background:linear-gradient(135deg,#0a150a,#0a1a0a)}
.wc-card:nth-child(8) .wc-cover{background:linear-gradient(135deg,#0f0a1a,#1a0a20)}

.wc-cover .wc-ph{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  opacity:.08;
}
.wc-ph .sh{width:50px;height:50px;border:2px solid currentColor;border-radius:12px;transform:rotate(45deg)}
.wc-ph span{font-family:var(--display);font-weight:700;font-size:1.2rem;letter-spacing:.08em}
.wc-card:nth-child(1) .wc-ph{color:var(--accent)}
.wc-card:nth-child(2) .wc-ph{color:var(--accent2)}
.wc-card:nth-child(3) .wc-ph{color:var(--accent3)}
.wc-card:nth-child(4) .wc-ph{color:#c084fc}
.wc-card:nth-child(5) .wc-ph{color:var(--accent)}
.wc-card:nth-child(6) .wc-ph{color:var(--accent2)}
.wc-card:nth-child(7) .wc-ph{color:var(--accent3)}
.wc-card:nth-child(8) .wc-ph{color:#c084fc}

.wc-body{padding:1.5rem}
.wc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.8rem}
.wc-id{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-top:2px}
.wc-arrow{font-size:1.2rem;color:var(--dim);transition:all .3s;opacity:0}
.wc-card:hover .wc-arrow{opacity:1;color:var(--accent2);transform:translate(3px,-3px)}
.wc-title{font-family:var(--display);font-weight:700;font-size:1.2rem;line-height:1.2;margin-bottom:.6rem}
.wc-about{font-size:.8rem;line-height:1.7;color:var(--dim);margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wc-tags{display:flex;flex-wrap:wrap;gap:.4rem}

/* ══════ PAGE 3: CONTACT ══════ */
.contact-card-inner{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.contact-label{font-size:.68rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--accent3);margin-bottom:1.5rem}
.contact-card-inner h2{font-family:var(--display);font-weight:800;font-size:clamp(2rem,5vw,3.5rem);line-height:1.05;margin-bottom:1rem}
.contact-card-inner h2 .outline{-webkit-text-stroke:1.5px var(--cream);-webkit-text-fill-color:transparent}
.contact-card-inner>p{font-size:.95rem;color:var(--dim);margin-bottom:2rem;max-width:420px;line-height:1.8}
.contact-email{font-family:var(--display);font-weight:700;font-size:clamp(1.2rem,2.5vw,1.8rem);color:var(--accent2);position:relative;padding-bottom:.4rem;transition:color .3s;display:inline-block;margin-bottom:2rem}
.contact-email:hover{color:var(--accent)}
.contact-email::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1.5px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.contact-socials{display:flex;gap:.8rem;margin-bottom:2rem}
.soc{width:44px;height:44px;border-radius:50%;border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .4s}
.soc:hover{border-color:var(--accent);background:rgba(255,58,92,.06);transform:translateY(-3px)}

/* ══════ FOOTER ══════ */
.footer{position:fixed;bottom:1.5rem;left:1.5rem;z-index:50;padding:0;display:flex;font-size:.65rem;color:rgba(255,255,255,.3);transition:left var(--transition)}
.sidebar:hover ~ .main .footer{left:1.5rem}

/* ══════ RESPONSIVE ══════ */
@media(max-width:900px){
  .layout{padding:.5rem;gap:.5rem}
  .sidebar{border-radius:12px}
  .main{border-radius:12px}

<script>
// ══════ HORIZONTAL SCROLL (INFINITE LOOP) ══════
const pagesWrapper = document.getElementById('pagesWrapper');
const navItems = document.querySelectorAll('.nav-section .nav-item');
const pages = document.querySelectorAll('.page');
let current = 0;

// Calculate page width dynamically
function getPageWidth() {
  // Use actual distance between adjacent pages
  return pages[1].offsetLeft - pages[0].offsetLeft;
}

// ══════ 根据当前页面决定滚动方向 ══════
let activeSubScrollTrack = null; // 当前激活的子滚动轨道

function getCurrentPageIndex() {
  const scrollLeft = pagesWrapper.scrollLeft;
  const pageWidth = getPageWidth();
  return Math.round(scrollLeft / pageWidth);
}

function updateActiveScrollTrack() {
  const idx = getCurrentPageIndex();
  // 作品页(1)或文创页(2)激活垂直滚动
  if (idx === 1) {
    activeSubScrollTrack = 'scroll-track-1';
  } else if (idx === 2) {
    activeSubScrollTrack = 'scroll-track-2';
  } else {
    activeSubScrollTrack = null;
  }
}

// ══════ 滚动轨道元素引用 ══════
const scrollTrack1 = document.getElementById('scroll-track-1');
const scrollTrack2 = document.getElementById('scroll-track-2');

// ══════ UPDATE SUB-SCROLL DOTS & FADE ══════
function updateSubDots(trackId, dotIndex) {
  const dotsId = trackId.replace('scroll-track-', 'dots-');
  const dots = document.querySelectorAll(`#${dotsId} .page-dot`);
  dots.forEach((d, i) => d.classList.toggle('active', i === dotIndex));
  
  // Update fade indicators
  const page = document.getElementById(trackId)?.closest('.page');
  if (page) {
    const track = document.getElementById(trackId);
    const maxScroll = track.scrollHeight - track.clientHeight;
    page.classList.toggle('subscroll-top', track.scrollTop > 10);
    page.classList.toggle('subscroll-bottom', track.scrollTop < maxScroll - 10);
  }
}

function scrollSubPage(pageNum, dotIndex) {
  // pageNum: 1=works, 2=wenchuang
  const trackId = 'scroll-track-' + pageNum;
  const track = document.getElementById(trackId);
  if (!track) return;
  
  const rows = track.querySelectorAll('.row-group');
  const rowHeight = rows.length > 0 ? rows[0].offsetHeight : track.clientHeight;
  track.scrollTo({ top: dotIndex * rowHeight, behavior: 'smooth' });
  updateSubDots(trackId, dotIndex);
}

// Watch scroll tracks to update dots
[scrollTrack1, scrollTrack2].forEach(track => {
  if (!track) return;
  track.addEventListener('scroll', () => {
    if (!activeSubScrollTrack || activeSubScrollTrack !== track.id) return;
    const rows = track.querySelectorAll('.row-group');
    const rowHeight = rows.length > 0 ? rows[0].offsetHeight : track.clientHeight;
    const dotIndex = Math.round(track.scrollTop / rowHeight);
    updateSubDots(track.id, dotIndex);
  });
});

// Wheel → 水平滚动切换页面
window.addEventListener('wheel', e => {
  e.preventDefault();
  
  const pageWidth = getPageWidth();
  let targetIndex;
  
  if (e.deltaY > 0) {
    // 向下滚 → 下一页
    targetIndex = current + 1;
    if (targetIndex >= pages.length) targetIndex = 0; // 循环
  } else {
    // 向上滚 → 上一页
    targetIndex = current - 1;
    if (targetIndex < 0) targetIndex = pages.length - 1; // 循环
  }
  
  current = targetIndex;
  const targetScroll = targetIndex * pageWidth;
  pagesWrapper.scrollTo({ left: targetScroll, behavior: 'smooth' });
  updateNav(current);
}, { passive: false });

// Keyboard → 水平滚动切换页面
window.addEventListener('keydown', e => {
  const pageWidth = getPageWidth();
  let targetIndex;
  
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    targetIndex = current + 1;
    if (targetIndex >= pages.length) targetIndex = 0;
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    targetIndex = current - 1;
    if (targetIndex < 0) targetIndex = pages.length - 1;
  } else {
    return;
  }
  
  current = targetIndex;
  const targetScroll = targetIndex * pageWidth;
  pagesWrapper.scrollTo({ left: targetScroll, behavior: 'smooth' });
  updateNav(current);
});

// Nav → go to page
function goTo(index) {
  const targetPage = pages[index];
  if (targetPage) {
    targetPage.scrollIntoView({ behavior: 'smooth', inline: 'start' });
  }
}

// Scroll sync → update nav
function updateNav(forcedIndex) {
  if (typeof forcedIndex === 'number' && forcedIndex >= 0 && forcedIndex < pages.length) {
    // Direct page switch (infinite loop)
    current = forcedIndex;
    navItems.forEach((n, i) => n.classList.toggle('active', i === current));
    document.body.setAttribute('data-section', current);
  } else {
    // Normal scroll detection
    const scrollLeft = pagesWrapper.scrollLeft;
    const pageWidth = getPageWidth();
    const newCurrent = Math.round(scrollLeft / pageWidth);
    if (newCurrent !== current && newCurrent >= 0 && newCurrent < pages.length) {
      current = newCurrent;
      navItems.forEach((n, i) => n.classList.toggle('active', i === current));
      document.body.setAttribute('data-section', current);
    }
  }
}

pagesWrapper.addEventListener('scroll', updateNav, { passive: true });

// ══════ WENCHUANG → WORKS JUMP ══════
function jumpToWork(n) {
  // Scroll to works page (page 1)
  const worksPage = document.getElementById('page-1');
  if (worksPage) {
    worksPage.scrollIntoView({ behavior: 'smooth', inline: 'start' });
  }
  setTimeout(() => {
    const card = document.getElementById('work-' + n);
    if (card) {
      card.style.outline = '2px solid var(--accent)';
      card.style.outlineOffset = '4px';
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => {
        card.style.outline = '';
        card.style.outlineOffset = '';
      }, 2000);
    }
  }, 400);
}

// ══════ DYNAMIC CONTENT RENDERING ══════
const WORKS_KEY = 'lxlylzl_works';
const WENCHUANG_KEY = 'lxlylzl_wenchuang';

// 默认作品数据

  { id:'002', titleZh:'海报设计', titleEn:'Poster Design', aboutZh:'品牌活动、文化艺术节及商业推广海报，通过视觉语言传递信息与情感。', aboutEn:'Brand events, cultural festivals and commercial posters communicating through visual language.', tags:['海报','视觉','排版'] },
  { id:'003', titleZh:'LOGO 设计', titleEn:'Logo Design', aboutZh:'品牌标识从概念构思到矢量输出，打造具有辨识度的品牌符号。', aboutEn:'Brand logo from concept to vector output, creating distinctive brand symbols.', tags:['LOGO','品牌','矢量'] },
  { id:'004', titleZh:'商业插画', titleEn:'Commercial Illustration', aboutZh:'品牌插画与原创图形，为品牌注入独特艺术气质，适用多场景应用。', aboutEn:'Brand illustration and original graphics adding artistic character for multi-scenario use.', tags:['插画','图形','原创'] }
];

// 默认文创数据
const DEFAULT_WENCHUANG = [
  { id:'001', titleZh:'详情页设计', titleEn:'Detail Page', aboutZh:'电商店铺产品详情页，提升转化率。', aboutEn:'E-commerce product detail pages.', tag1Zh:'详情页', tag1En:'Detail', tag2Zh:'电商', tag2En:'E-com' },
  { id:'002', titleZh:'包装设计', titleEn:'Packaging', aboutZh:'产品包装设计，打造独特品牌形象。', aboutEn:'Product packaging design creating unique brand image.', tag1Zh:'包装', tag1En:'Pack', tag2Zh:'品牌', tag2En:'Brand' }
];

// 渲染作品
function renderWorks() {
  const container = document.getElementById('worksGridContent');
  if (!container) return;
  
  let works = JSON.parse(localStorage.getItem(WORKS_KEY) || 'null');
  if (!works) {
    works = DEFAULT_WORKS;
    localStorage.setItem(WORKS_KEY, JSON.stringify(works));
  }
  
  if (works.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--dim)">暂无作品</div>';
    return;
  }
  
  // 按2个一组分行
  let html = '';
  for (let i = 0; i < works.length; i += 2) {
    html += '<div class="row-group">';
    const w1 = works[i];
    const w2 = works[i + 1];
    
    const tagColors = ['accent','accent2','accent3','purple'];
    const makeTags = (tags) => tags.map((t,ti) => `<span class="work-tag ${tagColors[ti % tagColors.length]}">${t}</span>`).join('');
    const makeWorkCard = (w, idx) => `
      <div class="work-card">
        <div class="work-cover">
          <div class="cover-ph"><div class="sh"></div><span>${String(idx + 1).padStart(2,'0')}</span></div>
        </div>
        <div class="work-body">
          <div class="work-top">
            <div class="work-id">SERIAL NO.${w.id || String(idx + 1).padStart(3,'0')}</div>
            <div class="work-arrow">↗</div>
          </div>
          <div class="work-title" data-zh="${w.titleZh}" data-en="${w.titleEn}">${w.titleZh}</div>
          <div class="work-about" data-zh="${w.aboutZh}" data-en="${w.aboutEn}">${w.aboutZh}</div>
          <div class="work-tags">${makeTags(w.tags || [])}</div>
        </div>
      </div>`;
    
    html += makeWorkCard(w1, i);
    if (w2) html += makeWorkCard(w2, i + 1);
    html += '</div>';
  }
  
  container.innerHTML = html;
  
  // 更新 dots
  updateWorksDots(works.length);
}

// 渲染文创
function renderWenchuang() {
  const container = document.getElementById('wenchuangGridContent');
  if (!container) return;
  
  let items = JSON.parse(localStorage.getItem(WENCHUANG_KEY) || 'null');
  if (!items) {
    items = DEFAULT_WENCHUANG;
    localStorage.setItem(WENCHUANG_KEY, JSON.stringify(items));
  }
  
  if (items.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--dim)">暂无文创</div>';
    return;
  }
  
  let html = '';
  for (let i = 0; i < items.length; i += 2) {
    html += '<div class="row-group">';
    const w1 = items[i];
    const w2 = items[i + 1];
    
    const tagColors = ['accent','accent2','accent3','purple'];
    const makeWcCard = (w, idx) => `
      <div class="wc-card" onclick="jumpToWork(${idx + 1})">
        <div class="wc-cover">
          <div class="wc-ph"><div class="sh"></div><span>${String(idx + 1).padStart(2,'0')}</span></div>
        </div>
        <div class="wc-body">

            <div class="wc-id">SERIAL NO.${w.id || String(idx + 1).padStart(3,'0')}</div>

          <div class="wc-title" data-zh="${w.titleZh}" data-en="${w.titleEn}">${w.titleZh}</div>

          <div class="wc-tags">
            <span class="work-tag ${tagColors[0]}">${w.tag1Zh || ''}</span>
            ${w.tag2Zh ? `<span class="work-tag">${w.tag2Zh}</span>` : ''}
          </div>
        </div>
      </div>`;
    
    html += makeWcCard(w1, i);
    if (w2) html += makeWcCard(w2, i + 1);
    html += '</div>';

  container.innerHTML = html;
  
  // 更新 dots

// 更新作品 dots
function updateWorksDots(count) {
  const dotsContainer = document.getElementById('dots-1');
  if (!dotsContainer) return;
  const rows = Math.ceil(count / 2);
  dotsContainer.innerHTML = Array.from({length: rows}, (_, i) => 
    `<div class="page-dot ${i===0?'active':''}" onclick="scrollSubPage(1, ${i})"></div>`
  ).join('');
}

// 更新文创 dots
function updateWenchuangDots(count) {
  const dotsContainer = document.getElementById('dots-2');
  if (!dotsContainer) return;
  const rows = Math.ceil(count / 2);
  dotsContainer.innerHTML = Array.from({length: rows}, (_, i) => 
    `<div class="page-dot ${i===0?'active':''}" onclick="scrollSubPage(2, ${i})"></div>`
  ).join('');
}

function getBlogPosts() {
  const stored = localStorage.getItem(BLOG_STORAGE_KEY);
  return stored ? JSON.parse(stored) : [];
}

// 保存博客文章
function saveBlogPosts(posts) {
  localStorage.setItem(BLOG_STORAGE_KEY, JSON.stringify(posts));
}

// 添加一篇博客文章
function addBlogPost(title, excerpt, date) {
  const posts = getBlogPosts();
  posts.unshift({ title, excerpt, date: date || new Date().toISOString().split('T')[0] });
  saveBlogPosts(posts);
  renderBlogPosts();
}

// 删除一篇博客文章
function deleteBlogPost(index) {
  const posts = getBlogPosts();
  posts.splice(index, 1);
  saveBlogPosts(posts);
  renderBlogPosts();
}

// 渲染博客列表
function renderBlogPosts() {
  const list = document.getElementById('blogList');
  if (!list) return;
  
  const posts = getBlogPosts();
  
  if (posts.length === 0) {
    list.innerHTML = `<div class="blog-empty" data-zh="暂无内容，明天见！" data-en="No posts yet, see you tomorrow!">暂无内容，明天见！</div>`;
    return;
  }
  
  list.innerHTML = posts.map((post, i) => `
    <div class="blog-post" onclick="this.classList.toggle('expanded')">
      <div class="blog-post-date">${post.date}</div>
      <div class="blog-post-title">${post.title}</div>
      <div class="blog-post-excerpt">${post.excerpt}</div>
    </div>
  `).join('');
  
  // 应用当前语言
  if (typeof updateLang === 'function') updateLang(currentLang);
}

// 初始化博客
function initBlog() {
  renderBlogPosts();
  
  // 如果是开发者模式（按住 Ctrl+Shift+B），显示添加文章的提示
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'B') {
      const title = prompt('输入文章标题（中文）:');
      if (title) {
        const excerpt = prompt('输入文章摘要:');
        if (excerpt) {
          addBlogPost(title, excerpt);
        }
      }
    }
  });
}

// ══════ LANGUAGE TOGGLE ══════
let currentLang = 'zh';
const langToggle = document.getElementById('langToggle');
const langLabel = document.getElementById('langLabel');

function setLang(lang) {
  currentLang = lang;
  langLabel.textContent = lang === 'zh' ? '中文' : 'EN';
  document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
  document.querySelectorAll('[data-zh][data-en]').forEach(el => {
    const text = el.getAttribute('data-' + lang);
    if (text) el.textContent = text;
  });
  // 语言切换时重新渲染动态内容
  renderWorks();
  renderWenchuang();
  renderBlogPosts();
}

langToggle.addEventListener('click', () => setLang(currentLang === 'zh' ? 'en' : 'zh'));
langToggle.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setLang(currentLang === 'zh' ? 'en' : 'zh'); }});

// 初始化博客
initBlog();

// 初始化作品和文创
renderWorks();
renderWenchuang();
</script>
</body>
