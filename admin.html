<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 — LXLYLZL</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--card:#1a1a1a;--card-hover:#222;
  --border:rgba(255,255,255,.07);--dim:rgba(255,255,255,.4);
  --accent:#FF3A5C;--accent2:#00E0FF;--accent3:#B8FF57;
  --warn:#ffb347;--danger:#ff4757;--success:#2ed573;
  --display:'Syne','Noto Sans SC',sans-serif;
  --body:'Space Grotesk','Noto Sans SC',sans-serif;
}
html,body{height:100%;font-family:var(--body);background:var(--bg);color:#fff;}

/* ════ LOGIN ════ */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.login-box{
  width:380px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:3rem;
}
.login-logo{
  text-align:center;margin-bottom:2rem;
}
.login-logo .logo{
  width:56px;height:56px;border-radius:14px;background:var(--accent);
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:1.5rem;
  box-shadow:0 0 20px rgba(255,58,92,.3);
}
.login-logo h1{
  font-family:var(--display);font-weight:700;font-size:1.4rem;margin-top:1rem;
}
.login-logo p{color:var(--dim);font-size:.85rem;margin-top:.3rem}
.login-box label{
  display:block;font-size:.8rem;color:var(--dim);margin-bottom:.5rem;letter-spacing:.05em;
}
.login-box input{
  width:100%;padding:.8rem 1rem;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:10px;color:#fff;
  font-family:var(--body);font-size:.95rem;outline:none;
  transition:border-color .2s;
}
.login-box input:focus{border-color:var(--accent)}
.login-box .error{
  color:var(--danger);font-size:.8rem;margin-top:.5rem;display:none;
}
.login-box button{
  width:100%;margin-top:1.5rem;padding:.9rem;border:none;border-radius:10px;
  background:var(--accent);color:#fff;font-family:var(--display);font-weight:600;
  font-size:1rem;cursor:pointer;transition:all .2s;
}
.login-box button:hover{background:#e0294a;transform:translateY(-1px)}

/* ════ ADMIN LAYOUT ════ */
.admin-wrap{display:none;min-height:100vh}
.admin-wrap.show{display:flex}

/* Sidebar */
.admin-sidebar{
  width:220px;background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;
}
.admin-sidebar-logo{
  padding:1.5rem 1.2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.8rem;
}
.admin-sidebar-logo .logo{
  width:36px;height:36px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:.9rem;flex-shrink:0;
}
.admin-sidebar-logo span{
  font-family:var(--display);font-weight:700;font-size:.9rem;
}
.admin-nav{padding:1rem 0;flex:1}
.admin-nav-item{
  display:flex;align-items:center;gap:.8rem;padding:.75rem 1.2rem;
  cursor:pointer;transition:all .2s;font-size:.9rem;
  border-left:3px solid transparent;
}
.admin-nav-item:hover{background:rgba(255,255,255,.04)}
.admin-nav-item.active{
  background:rgba(255,58,92,.1);border-left-color:var(--accent);color:var(--accent)
}
.admin-nav-item .icon{font-size:1.1rem;width:20px;text-align:center}
.admin-sidebar-bottom{
  padding:1rem 1.2rem;border-top:1px solid var(--border);
}
.admin-sidebar-bottom a{
  display:flex;align-items:center;gap:.5rem;color:var(--dim);font-size:.85rem;
  text-decoration:none;transition:color .2s;
}
.admin-sidebar-bottom a:hover{color:var(--accent)}

/* Main Content */
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.admin-header{
  padding:1.5rem 2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.admin-header h2{
  font-family:var(--display);font-weight:700;font-size:1.3rem;
}
.admin-header .lang-stat{
  font-size:.8rem;color:var(--dim);
}
.admin-body{
  flex:1;overflow-y:auto;padding:2rem;
}

/* Panel */
.admin-panel{display:none}
.admin-panel.active{display:block}

.panel-toolbar{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;
}
.panel-toolbar h3{
  font-family:var(--display);font-weight:600;font-size:1rem;color:var(--dim);
  letter-spacing:.03em;
}
.btn-add{
  display:flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;
  background:var(--accent);border:none;border-radius:8px;color:#fff;
  font-family:var(--body);font-weight:500;font-size:.85rem;cursor:pointer;
  transition:all .2s;
}
.btn-add:hover{background:#e0294a;transform:translateY(-1px)}

/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{
  text-align:left;padding:.75rem 1rem;font-size:.75rem;font-weight:500;
  color:var(--dim);letter-spacing:.05em;text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.data-table td{
  padding:1rem;font-size:.9rem;border-bottom:1px solid rgba(255,255,255,.04);
  vertical-align:top;
}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.data-table .id-col{color:var(--dim);font-size:.8rem;width:60px}
.data-table .title-col{font-weight:500;max-width:200px}
.data-table .about-col{color:var(--dim);font-size:.8rem;max-width:250px;line-height:1.5}
.data-table .tags-col{width:150px}
.tag{
  display:inline-block;padding:.2rem .5rem;border-radius:4px;font-size:.7rem;
  margin:.15rem .1rem;background:rgba(255,255,255,.06);
}
.tag.accent{background:rgba(255,58,92,.15);color:var(--accent)}
.tag.accent2{background:rgba(0,224,255,.1);color:var(--accent2)}
.tag.accent3{background:rgba(184,255,87,.1);color:var(--accent3)}
.data-table .actions-col{width:100px;text-align:right}
.btn-action{
  padding:.4rem .7rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--dim);font-size:.75rem;cursor:pointer;
  transition:all .2s;margin-left:.3rem;
}
.btn-action:hover{background:rgba(255,255,255,.08);color:#fff}
.btn-action.delete:hover{background:rgba(255,71,87,.15);color:var(--danger);border-color:var(--danger)}
.btn-action.edit:hover{background:rgba(255,58,92,.15);color:var(--accent);border-color:var(--accent)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;z-index:1000;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex}
.modal{
  width:560px;max-height:85vh;background:var(--card);
  border:1px solid var(--border);border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;
}
.modal-header{
  padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-header h3{font-family:var(--display);font-weight:600;font-size:1.1rem}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
}
.modal-close:hover{background:rgba(255,255,255,.08);color:#fff}
.modal-body{
  padding:1.5rem;overflow-y:auto;flex:1;
}
.modal-footer{
  padding:1rem 1.5rem;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:.8rem;
}
.form-row{margin-bottom:1.2rem}
.form-row label{
  display:block;font-size:.8rem;color:var(--dim);margin-bottom:.4rem;letter-spacing:.04em;
}
.form-row input,.form-row textarea,.form-row select{
  width:100%;padding:.7rem .9rem;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:8px;color:#fff;
  font-family:var(--body);font-size:.9rem;outline:none;
  transition:border-color .2s;
}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{
  border-color:var(--accent);
}
.form-row textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row small{color:var(--dim);font-size:.75rem;margin-top:.3rem;display:block}
.form-cols{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:.4rem;min-height:42px;
  padding:.5rem;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;cursor:text;}
.tag-input-wrap:focus-within{border-color:var(--accent)}
.tag-input-wrap .tag{
  display:inline-flex;align-items:center;gap:.3rem;cursor:default;
}
.tag-input-wrap .tag .remove{
  cursor:pointer;opacity:.5;transition:opacity .2s;
}
.tag-input-wrap .tag .remove:hover{opacity:1}
.tag-input-wrap input{
  border:none;background:transparent;padding:.2rem;flex:1;min-width:60px;
  outline:none;box-shadow:none;width:auto;
}
.btn-primary{
  padding:.7rem 1.5rem;border:none;border-radius:8px;
  background:var(--accent);color:#fff;font-family:var(--body);font-weight:500;
  cursor:pointer;transition:all .2s;
}
.btn-primary:hover{background:#e0294a}
.btn-secondary{
  padding:.7rem 1.5rem;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--dim);font-family:var(--body);font-weight:500;
  cursor:pointer;transition:all .2s;
}
.btn-secondary:hover{background:rgba(255,255,255,.06);color:#fff}

/* Blog specific */
.blog-date{color:var(--dim);font-size:.8rem;margin-bottom:.3rem}
.blog-title{font-weight:500;margin-bottom:.4rem}
.blog-excerpt{color:var(--dim);font-size:.8rem;line-height:1.5}

/* Empty state */
.empty-state{
  text-align:center;padding:4rem 2rem;
}
.empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:.3}
.empty-state p{color:var(--dim);font-size:.95rem}

/* Responsive */
@media(max-width:768px){
  .admin-sidebar{width:60px}
  .admin-sidebar-logo span,.admin-nav-item span:last-child,.admin-sidebar-bottom span:last-child{display:none}
  .admin-nav-item{justify-content:center;padding:.75rem}
  .admin-nav-item .icon{width:auto}
  .admin-body{padding:1rem}
  .form-cols{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo">L</div>
      <h1>LXLYLZL 后台</h1>
      <p>设计作品集管理系统</p>
    </div>
    <div>
      <label>访问密码</label>
      <input type="password" id="passwordInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')tryLogin()">
      <div class="error" id="loginError">密码错误，请重试</div>
    </div>
    <button onclick="tryLogin()">进入后台</button>
  </div>
</div>

<!-- ════ ADMIN PANEL ════ -->
<div class="admin-wrap" id="adminWrap">
  
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <div class="logo">L</div>
      <span>后台管理</span>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-item active" onclick="showPanel('works')">
        <span class="icon">&#9632;</span>
        <span>作品管理</span>
      </div>
      <div class="admin-nav-item" onclick="showPanel('wenchuang')">
        <span class="icon">&#9670;</span>
        <span>文创管理</span>
      </div>
      <div class="admin-nav-item" onclick="showPanel('blog')">
        <span class="icon">&#9673;</span>
        <span>博客管理</span>
      </div>
    </nav>
    <div class="admin-sidebar-bottom">
      <a href="index.html" target="_blank">&#8594; 查看网站</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    
    <!-- Works Panel -->
    <div class="admin-panel active" id="panel-works">
      <div class="admin-header">
        <h2>作品管理</h2>
        <span class="lang-stat">共 <strong id="worksCount">0</strong> 个作品</span>
      </div>
      <div class="admin-body">
        <div class="panel-toolbar">
          <h3>所有作品</h3>
          <button class="btn-add" onclick="openWorkModal()">+ 添加作品</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th class="id-col">编号</th>
              <th>标题</th>
              <th>描述</th>
              <th>标签</th>
              <th class="actions-col"></th>
            </tr>
          </thead>
          <tbody id="worksBody"></tbody>
        </table>
        <div class="empty-state" id="worksEmpty" style="display:none">
          <div class="icon">&#9632;</div>
          <p>暂无作品，点击上方按钮添加</p>
        </div>
      </div>
    </div>

    <!-- Wenchuang Panel -->
    <div class="admin-panel" id="panel-wenchuang">
      <div class="admin-header">
        <h2>文创管理</h2>
        <span class="lang-stat">共 <strong id="wenchuangCount">0</strong> 个作品</span>
      </div>
      <div class="admin-body">
        <div class="panel-toolbar">
          <h3>所有文创</h3>
          <button class="btn-add" onclick="openWenchuangModal()">+ 添加文创</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th class="id-col">编号</th>
              <th>标题</th>
              <th>描述</th>
              <th class="actions-col"></th>
            </tr>
          </thead>
          <tbody id="wenchuangBody"></tbody>
        </table>
        <div class="empty-state" id="wenchuangEmpty" style="display:none">
          <div class="icon">&#9670;</div>
          <p>暂无文创，点击上方按钮添加</p>
        </div>
      </div>
    </div>

    <!-- Blog Panel -->
    <div class="admin-panel" id="panel-blog">
      <div class="admin-header">
        <h2>博客管理</h2>
        <span class="lang-stat">共 <strong id="blogCount">0</strong> 篇</span>
      </div>
      <div class="admin-body">
        <div class="panel-toolbar">
          <h3>所有文章</h3>
          <button class="btn-add" onclick="openBlogModal()">+ 添加文章</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th class="id-col">日期</th>
              <th>标题</th>
              <th>摘要</th>
              <th class="actions-col"></th>
            </tr>
          </thead>
          <tbody id="blogBody"></tbody>
        </table>
        <div class="empty-state" id="blogEmpty" style="display:none">
          <div class="icon">&#9673;</div>
          <p>暂无文章，点击上方按钮添加</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ════ MODAL: WORK ════ -->
<div class="modal-overlay" id="workModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="workModalTitle">添加作品</h3>
      <button class="modal-close" onclick="closeWorkModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>编号</label>
        <input type="text" id="workId" placeholder="如 001">
      </div>
      <div class="form-cols">
        <div class="form-row">
          <label>标题（中文）</label>
          <input type="text" id="workTitleZh" placeholder="详情页设计">
        </div>
        <div class="form-row">
          <label>标题（英文）</label>
          <input type="text" id="workTitleEn" placeholder="Product Detail Page">
        </div>
      </div>
      <div class="form-row">
        <label>描述（中文）</label>
        <textarea id="workAboutZh" placeholder="电商店铺产品详情页..."></textarea>
      </div>
      <div class="form-row">
        <label>描述（英文）</label>
        <textarea id="workAboutEn" placeholder="E-commerce product detail pages..."></textarea>
      </div>
      <div class="form-row">
        <label>标签</label>
        <div class="tag-input-wrap" id="workTagWrap" onclick="document.getElementById('workTagInput').focus()">
          <input type="text" id="workTagInput" placeholder="输入后按回车添加" onkeydown="addTagToWrap(event,'workTagWrap','workTags')">
        </div>
        <small>点击标签 × 可删除</small>
      </div>
      <input type="hidden" id="workEditIndex">
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeWorkModal()">取消</button>
      <button class="btn-primary" onclick="saveWork()">保存</button>
    </div>
  </div>
</div>

<!-- ════ MODAL: WENCHUANG ════ -->
<div class="modal-overlay" id="wenchuangModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="wenchuangModalTitle">添加文创</h3>
      <button class="modal-close" onclick="closeWenchuangModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>编号</label>
        <input type="text" id="wcId" placeholder="如 001">
      </div>
      <div class="form-cols">
        <div class="form-row">
          <label>标题（中文）</label>
          <input type="text" id="wcTitleZh" placeholder="详情页设计">
        </div>
        <div class="form-row">
          <label>标题（英文）</label>
          <input type="text" id="wcTitleEn" placeholder="Detail Page">
        </div>
      </div>
      <div class="form-row">
        <label>描述（中文）</label>
        <textarea id="wcAboutZh" placeholder="电商店铺产品详情页..."></textarea>
      </div>
      <div class="form-row">
        <label>描述（英文）</label>
        <textarea id="wcAboutEn" placeholder="E-commerce product detail pages..."></textarea>
      </div>
      <div class="form-cols">
        <div class="form-row">
          <label>标签1（中文）</label>
          <input type="text" id="wcTag1Zh" placeholder="详情页">
        </div>
        <div class="form-row">
          <label>标签1（英文）</label>
          <input type="text" id="wcTag1En" placeholder="Detail">
        </div>
      </div>
      <div class="form-cols">
        <div class="form-row">
          <label>标签2（中文）</label>
          <input type="text" id="wcTag2Zh" placeholder="电商">
        </div>
        <div class="form-row">
          <label>标签2（英文）</label>
          <input type="text" id="wcTag2En" placeholder="E-com">
        </div>
      </div>
      <input type="hidden" id="wcEditIndex">
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeWenchuangModal()">取消</button>
      <button class="btn-primary" onclick="saveWenchuang()">保存</button>
    </div>
  </div>
</div>

<!-- ════ MODAL: BLOG ════ -->
<div class="modal-overlay" id="blogModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="blogModalTitle">添加文章</h3>
      <button class="modal-close" onclick="closeBlogModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>日期</label>
        <input type="date" id="blogDate">
      </div>
      <div class="form-row">
        <label>标题</label>
        <input type="text" id="blogTitle" placeholder="文章标题">
      </div>
      <div class="form-row">
        <label>摘要</label>
        <textarea id="blogExcerpt" placeholder="文章摘要内容..."></textarea>
      </div>
      <input type="hidden" id="blogEditIndex">
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeBlogModal()">取消</button>
      <button class="btn-primary" onclick="saveBlog()">保存</button>
    </div>
  </div>
</div>

<script>
// ════ CONFIG ════
const ADMIN_PASSWORD = 'lxlylzl2026';

// ════ STORAGE KEYS ════
const KEYS = {
  works: 'lxlylzl_works',
  wenchuang: 'lxlylzl_wenchuang',
  blog: 'lxlylzl_blog'
};

// ════ INIT ════
function tryLogin() {
  const pwd = document.getElementById('passwordInput').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').classList.add('show');
    loadAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function loadAll() {
  loadWorks();
  loadWenchuang();
  loadBlog();
}

// ════ PANEL SWITCH ════
function showPanel(name) {
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.admin-nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ════ WORKS ════
function getWorks() { return JSON.parse(localStorage.getItem(KEYS.works) || '[]'); }
function saveWorks(arr) { localStorage.setItem(KEYS.works, JSON.stringify(arr)); }

function loadWorks() {
  const works = getWorks();
  const tbody = document.getElementById('worksBody');
  const empty = document.getElementById('worksEmpty');
  document.getElementById('worksCount').textContent = works.length;
  
  if (works.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  tbody.innerHTML = works.map((w, i) => `
    <tr>
      <td class="id-col">${w.id || ''}</td>
      <td class="title-col">${w.titleZh || ''}</td>
      <td class="about-col">${w.aboutZh || ''}</td>
      <td class="tags-col">${(w.tags || []).map((t,ti) => `<span class="tag ${ti===0?'accent':ti===1?'accent2':'accent3'}">${t}</span>`).join('')}</td>
      <td class="actions-col">
        <button class="btn-action edit" onclick="editWork(${i})">编辑</button>
        <button class="btn-action delete" onclick="deleteWork(${i})">删除</button>
      </td>
    </tr>
  `).join('');
}

function openWorkModal(index) {
  document.getElementById('workEditIndex').value = index ?? '';
  document.getElementById('workModalTitle').textContent = index !== undefined ? '编辑作品' : '添加作品';
  
  // Reset
  ['workId','workTitleZh','workTitleEn','workAboutZh','workAboutEn'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('workTagWrap').innerHTML = '<input type="text" id="workTagInput" placeholder="输入后按回车添加" onkeydown="addTagToWrap(event,\'workTagWrap\',\'workTags\')">';
  
  if (index !== undefined) {
    const works = getWorks();
    const w = works[index];
    document.getElementById('workId').value = w.id || '';
    document.getElementById('workTitleZh').value = w.titleZh || '';
    document.getElementById('workTitleEn').value = w.titleEn || '';
    document.getElementById('workAboutZh').value = w.aboutZh || '';
    document.getElementById('workAboutEn').value = w.aboutEn || '';
    const wrap = document.getElementById('workTagWrap');
    const input = document.getElementById('workTagInput');
    (w.tags || []).forEach(tag => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.innerHTML = tag + '<span class="remove" onclick="removeTag(this)">&#10005;</span>';
      wrap.insertBefore(span, input);
    });
  }
  
  document.getElementById('workModal').classList.add('show');
}

function closeWorkModal() {
  document.getElementById('workModal').classList.remove('show');
}

function saveWork() {
  const idx = document.getElementById('workEditIndex').value;
  const tags = Array.from(document.querySelectorAll('#workTagWrap .tag')).map(t => t.textContent.replace('×','').trim());
  
  const item = {
    id: document.getElementById('workId').value,
    titleZh: document.getElementById('workTitleZh').value,
    titleEn: document.getElementById('workTitleEn').value,
    aboutZh: document.getElementById('workAboutZh').value,
    aboutEn: document.getElementById('workAboutEn').value,
    tags: tags
  };
  
  const works = getWorks();
  if (idx === '') {
    works.push(item);
  } else {
    works[parseInt(idx)] = item;
  }
  saveWorks(works);
  loadWorks();
  closeWorkModal();
}

function editWork(i) { openWorkModal(i); }
function deleteWork(i) {
  if (confirm('确定删除此作品？')) {
    const works = getWorks();
    works.splice(i, 1);
    saveWorks(works);
    loadWorks();
  }
}

// ════ BLOG ════
function getBlog() { return JSON.parse(localStorage.getItem(KEYS.blog) || '[]'); }
function saveBlogArr(arr) { localStorage.setItem(KEYS.blog, JSON.stringify(arr)); }

function loadBlog() {
  const posts = getBlog();
  const tbody = document.getElementById('blogBody');
  const empty = document.getElementById('blogEmpty');
  document.getElementById('blogCount').textContent = posts.length;
  
  if (posts.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  tbody.innerHTML = posts.map((p, i) => `
    <tr>
      <td class="id-col">${p.date || ''}</td>
      <td class="title-col">${p.title || ''}</td>
      <td class="about-col">${p.excerpt || ''}</td>
      <td class="actions-col">
        <button class="btn-action edit" onclick="editBlog(${i})">编辑</button>
        <button class="btn-action delete" onclick="deleteBlog(${i})">删除</button>
      </td>
    </tr>
  `).join('');
}

function openBlogModal(index) {
  document.getElementById('blogEditIndex').value = index ?? '';
  document.getElementById('blogModalTitle').textContent = index !== undefined ? '编辑文章' : '添加文章';
  document.getElementById('blogDate').value = index !== undefined ? (getBlog()[index]?.date || '') : new Date().toISOString().split('T')[0];
  document.getElementById('blogTitle').value = index !== undefined ? (getBlog()[index]?.title || '') : '';
  document.getElementById('blogExcerpt').value = index !== undefined ? (getBlog()[index]?.excerpt || '') : '';
  document.getElementById('blogModal').classList.add('show');
}

function closeBlogModal() {
  document.getElementById('blogModal').classList.remove('show');
}

function saveBlog() {
  const idx = document.getElementById('blogEditIndex').value;
  const item = {
    date: document.getElementById('blogDate').value,
    title: document.getElementById('blogTitle').value,
    excerpt: document.getElementById('blogExcerpt').value
  };
  
  const posts = getBlog();
  if (idx === '') {
    posts.unshift(item);
  } else {
    posts[parseInt(idx)] = item;
  }
  saveBlogArr(posts);
  loadBlog();
  closeBlogModal();
}

function editBlog(i) { openBlogModal(i); }
function deleteBlog(i) {
  if (confirm('确定删除此文章？')) {
    const posts = getBlog();
    posts.splice(i, 1);
    saveBlogArr(posts);
    loadBlog();
  }
}

// ════ TAG HELPERS ════
function addTagToWrap(e, wrapId, dataId) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.replace(',','').trim();
    if (!val) return;
    const wrap = document.getElementById(wrapId);
    const input = document.getElementById(e.target.id);
    const span = document.createElement('span');
    span.className = 'tag';
    span.innerHTML = val + '<span class="remove" onclick="removeTag(this)">&#10005;</span>';
    wrap.insertBefore(span, input);
    e.target.value = '';
  }
}
function removeTag(el) {
  el.parentElement.remove();
}
