<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LXLYLZL — 平面设计师</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--card:#151515;--card-border:rgba(255,255,255,.06);
  --cream:#ffffff;--dim:rgba(255,255,255,.45);--faint:rgba(255,255,255,.12);
  --accent:#FF3A5C;--accent2:#00E0FF;--accent3:#B8FF57;
  --display:'Syne','Noto Sans SC',sans-serif;
  --body:'Space Grotesk','Noto Sans SC',sans-serif;
}
html,body{height:100%;font-family:var(--body);background:var(--bg);color:var(--cream);overflow:hidden;touch-action:pan-x}

/* ══════ TOP HEADER ══════ */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:linear-gradient(to bottom,rgba(21,21,21,0.95),transparent);
}
.header-logo{
  display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(255,58,92,.3);
}
.logo-icon svg{width:18px;height:18px}
.logo-text{
  font-family:var(--display);font-weight:800;font-size:1rem;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--cream);
}
.lang-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:20px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--cream);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .3s;
}
.lang-btn:hover{background:rgba(255,255,255,0.15)}

/* ══════ MENU BUTTON (DROPDOWN) ══════ */
.menu-btn{
  display:flex;flex-direction:column;gap:5px;
  padding:10px;cursor:pointer;
  z-index:101;
}
.menu-btn span{
  display:block;width:22px;height:2px;
  background:var(--cream);border-radius:2px;
  transition:all .3s;
}
.menu-btn.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.menu-btn.active span:nth-child(2){opacity:0}
.menu-btn.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ══════ DROPDOWN MENU ══════ */
.dropdown-menu{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(21,21,21,0.98);
  z-index:99;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:8px;
  opacity:0;pointer-events:none;
  transition:opacity .35s;
}
.dropdown-menu.active{opacity:1;pointer-events:auto}
.menu-item{
  font-family:var(--display);font-size:2.5rem;font-weight:700;
  color:rgba(255,255,255,0.5);
  cursor:pointer;transition:all .3s;
  padding:10px 30px;
}
.menu-item:hover,.menu-item.active{color:var(--cream);transform:scale(1.05)}
.menu-item.active{color:var(--accent)}

/* ══════ FULLSCREEN SLIDER ══════ */
.slider{
  width:100%;height:100%;
  display:flex;
  overflow-x:auto;overflow-y:hidden;
  scroll-behavior:smooth;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.slider::-webkit-scrollbar{display:none}

/* ══════ FULL PAGE ══════ */
.page{
  width:100%;height:100%;
  flex-shrink:0;
  scroll-snap-align:start;
  display:flex;align-items:center;justify-content:center;
  background:var(--card);
}
.page-content{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 24px 40px;
  overflow-y:auto;
}
.page-content::-webkit-scrollbar{display:none}

/* ══════ HOME PAGE ══════ */
.home-content{text-align:center}
.home-tag{font-size:.7rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--accent2);margin-bottom:1.5rem}
.home-name{font-family:var(--display);font-weight:800;font-size:clamp(2.5rem,15vw,5rem);line-height:.95;letter-spacing:-.03em;margin-bottom:1rem}
.home-name .outline{-webkit-text-stroke:1.5px var(--cream);-webkit-text-fill-color:transparent}
.home-role{font-size:.9rem;color:var(--dim);margin-bottom:2rem;font-weight:300}
.home-email{font-size:1rem;color:var(--accent2);margin-bottom:2rem;transition:color .3s}
.home-email:hover{color:var(--accent)}
.home-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:14px 28px;border-radius:999px;
  font-family:var(--body);font-size:.7rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;
  transition:all .4s;
}
.btn-fill{background:var(--accent);color:#fff}
.btn-fill:active{transform:scale(.95)}
.btn-ghost{background:transparent;color:var(--cream);border:1px solid rgba(255,255,255,.2)}
.btn-ghost:active{border-color:var(--accent2);color:var(--accent2)}

/* ══════ WORKS PAGE ══════ */
.works-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem;width:100%}
.works-header h2{font-family:var(--display);font-weight:700;font-size:1.8rem}
.works-header .num{font-size:2rem;font-weight:800;color:rgba(255,255,255,.06)}
.works-scroll{
  flex:1;width:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:20px;
}
.works-scroll::-webkit-scrollbar{display:none}
.works-list{display:flex;flex-direction:column;gap:16px}
.work-card{
  width:100%;border-radius:16px;
  background:var(--bg);border:1px solid var(--card-border);
  overflow:hidden;cursor:pointer;
  transition:transform .3s;
}
.work-card:active{transform:scale(.98)}
.work-cover{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.cover-num{
  font-family:var(--display);font-weight:800;font-size:3rem;
  opacity:.1;color:var(--cream);
}
.work-body{padding:16px}
.work-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.work-id{font-size:.6rem;letter-spacing:.15em;color:var(--dim);font-weight:600}
.work-arrow{font-size:1.2rem;color:var(--dim)}
.work-title{font-family:var(--display);font-weight:700;font-size:1.1rem;margin-bottom:8px;line-height:1.3}
.work-about{font-size:.8rem;line-height:1.6;color:var(--dim);margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.work-tags{display:flex;flex-wrap:wrap;gap:6px}
.work-tag{
  font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  padding:4px 10px;border-radius:999px;
  border:1px solid rgba(0,0,0,.1);color:#666;
}
.work-tag.accent{background:rgba(255,58,92,.1);border-color:rgba(255,58,92,.2);color:var(--accent)}
.work-tag.accent2{background:rgba(0,224,255,.08);border-color:rgba(0,224,255,.15);color:var(--accent2)}
.work-tag.accent3{background:rgba(184,255,87,.08);border-color:rgba(184,255,87,.15);color:#666}
.work-tag.purple{background:rgba(192,132,252,.08);border-color:rgba(192,132,252,.15);color:#a855f7}

/* ══════ BLOG PAGE ══════ */
.blog-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem;width:100%}
.blog-header h2{font-family:var(--display);font-weight:700;font-size:1.8rem}
.blog-header .num{font-size:2rem;font-weight:800;color:rgba(255,255,255,.06)}
.blog-list{flex:1;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-right:8px}
.blog-list::-webkit-scrollbar{width:4px}
.blog-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.blog-empty{text-align:center;padding:3rem 1rem;color:var(--dim);font-size:1rem}
.blog-post{margin-bottom:16px;padding:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;transition:all .3s}
.blog-post:active{background:rgba(255,255,255,.06);transform:scale(.98)}
.blog-date{font-size:.7rem;color:var(--dim);margin-bottom:8px;letter-spacing:.05em}
.blog-title{font-family:var(--display);font-size:1.2rem;font-weight:600;margin-bottom:8px;line-height:1.4}
.blog-excerpt{font-size:.85rem;color:var(--dim);line-height:1.6}

/* ══════ CONTACT PAGE ══════ */
.contact-content{text-align:center;width:100%}
.contact-label{font-size:.65rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--accent3);margin-bottom:1.5rem}
.contact-title{font-family:var(--display);font-weight:800;font-size:clamp(1.8rem,10vw,2.5rem);line-height:1.1;margin-bottom:1rem}
.contact-title .outline{-webkit-text-stroke:1.5px var(--cream);-webkit-text-fill-color:transparent}
.contact-desc{font-size:.9rem;color:var(--dim);margin-bottom:2rem;line-height:1.7}
.contact-email{font-family:var(--display);font-weight:700;font-size:1.3rem;color:var(--accent2);margin-bottom:2rem;display:inline-block}
.contact-email:hover{color:var(--accent)}
.contact-email::after{content:'';display:block;width:100%;height:1.5px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.contact-socials{display:flex;gap:12px;justify-content:center}
.soc{width:48px;height:48px;border-radius:50%;border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .3s}
.soc:active{transform:scale(.9)}

/* ══════ PAGE INDICATOR ══════ */
.indicator{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:50;
}
.indicator-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.2);
  transition:all .3s;
}
.indicator-dot.active{background:var(--accent);transform:scale(1.3)}

/* ══════ EMPTY STATE ══════ */
.empty-state{text-align:center;padding:2rem;color:var(--dim)}

/* ══════ DARK THEME OVERRIDES FOR MOBILE ══════ */
body{background:#151515}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">

      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>

<!-- DROPDOWN MENU -->

  <div class="menu-item active" data-index="0" onclick="goToPage(0)">

</div>

<!-- FULLSCREEN SLIDER -->
<div class="slider" id="slider">

  <!-- PAGE 0: HOME -->
  <section class="page" data-index="0">
    <div class="page-content">
      <div class="home-content">
        <div class="home-tag" data-zh="平面设计师 · 品牌设计 · 视觉传达" data-en="Graphic Designer · Branding · Visual">平面设计师 · 品牌设计 · 视觉传达</div>

        <a href="mailto:757497092@qq.com" class="home-email">757497092@qq.com</a>

          <button class="btn btn-fill" onclick="goToPage(1)" data-zh="查看作品" data-en="View Works">查看作品</button>

  <!-- PAGE 1: WORKS -->

  <div class="indicator-dot" onclick="goToPage(3)"></div>
  <div class="indicator-dot" onclick="goToPage(4)"></div>
</div>

<script>
// ══════ DATA KEYS (与 index.html 共用 localStorage) ══════
const WORKS_KEY = 'lxlylzl_works';
const WENCHUANG_KEY = 'lxlylzl_wenchuang';
const BLOG_KEY = 'lxlylzl_blog_posts';

const DEFAULT_WORKS = [
  { id:'001', titleZh:'详情页设计', titleEn:'Product Detail Page', aboutZh:'电商店铺产品详情页设计，突出产品卖点与使用场景。', aboutEn:'E-commerce product detail pages highlighting features.', tags:['详情页','电商','视觉'] },
  { id:'002', titleZh:'海报设计', titleEn:'Poster Design', aboutZh:'品牌活动、文化艺术节及商业推广海报。', aboutEn:'Brand events, cultural posters.', tags:['海报','视觉','排版'] },
  { id:'003', titleZh:'LOGO 设计', titleEn:'Logo Design', aboutZh:'品牌标识从概念构思到矢量输出。', aboutEn:'Brand logo from concept to vector.', tags:['LOGO','品牌','矢量'] },
  { id:'004', titleZh:'商业插画', titleEn:'Commercial Illustration', aboutZh:'品牌插画与原创图形，为品牌注入艺术气质。', aboutEn:'Brand illustration adding artistic character.', tags:['插画','图形','原创'] }
];

const DEFAULT_WENCHUANG = [
  { id:'001', titleZh:'详情页设计', titleEn:'Detail Page', aboutZh:'电商店铺产品详情页，提升转化率。', aboutEn:'E-commerce product detail pages.', tags:['详情页','电商'] },
  { id:'002', titleZh:'包装设计', titleEn:'Packaging', aboutZh:'产品包装设计，打造独特品牌形象。', aboutEn:'Product packaging design.', tags:['包装','品牌'] }
];

// ══════ STATE ══════
let currentPage = 0;
let currentLang = 'zh';
const totalPages = 5;
const slider = document.getElementById('slider');

// ══════ LANGUAGE ══════
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  document.getElementById('langLabel').textContent = currentLang === 'zh' ? '中文' : 'EN';
  document.documentElement.lang = currentLang === 'zh' ? 'zh' : 'en';
  
  document.querySelectorAll('[data-zh][data-en]').forEach(el => {
    const text = el.getAttribute('data-' + currentLang);
    if (text) el.textContent = text;
  });
}

// ══════ MENU ══════
let menuOpen = false;
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('menuBtn').classList.toggle('active', menuOpen);
  document.getElementById('dropdownMenu').classList.toggle('active', menuOpen);
}

function closeMenu() {
  menuOpen = false;
  document.getElementById('menuBtn').classList.remove('active');
  document.getElementById('dropdownMenu').classList.remove('active');
}

// ══════ NAVIGATION ══════
function goToPage(index) {
  currentPage = index;
  slider.scrollTo({ left: window.innerWidth * index, behavior: 'smooth' });
  updateIndicator(index);
  updateMenuActive(index);
  closeMenu();
}

function updateIndicator(index) {
  document.querySelectorAll('.indicator-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === index);
  });
}

function updateMenuActive(index) {
  document.querySelectorAll('.menu-item').forEach((item, i) => {
    item.classList.toggle('active', i === index);
  });
}

// ══════ TOUCH SWIPE ══════
let touchStartX = 0;
let touchStartY = 0;
let isScrolling = false;

slider.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isScrolling = false;
}, { passive: true });

slider.addEventListener('touchmove', e => {
  const deltaX = Math.abs(e.touches[0].clientX - touchStartX);
  const deltaY = Math.abs(e.touches[0].clientY - touchStartY);
  if (deltaY > deltaX) {
    isScrolling = true; // 垂直滚动，不拦截
  }
}, { passive: true });

slider.addEventListener('touchend', e => {
  if (isScrolling) return;
  
  const deltaX = e.changedTouches[0].clientX - touchStartX;
  const threshold = window.innerWidth * 0.2; // 滑动超过20%宽度触发
  
  if (deltaX < -threshold) {
    // 向左滑 → 下一页
    const nextPage = Math.min(currentPage + 1, totalPages - 1);
    if (nextPage !== currentPage) goToPage(nextPage);
  } else if (deltaX > threshold) {
    // 向右滑 → 上一页
    const prevPage = Math.max(currentPage - 1, 0);
    if (prevPage !== currentPage) goToPage(prevPage);
  }
}, { passive: true });

// 滚动结束时更新指示器
slider.addEventListener('scroll', () => {
  const scrollLeft = slider.scrollLeft;
  const pageWidth = window.innerWidth;
  const newPage = Math.round(scrollLeft / pageWidth);
  if (newPage !== currentPage) {
    currentPage = newPage;
    updateIndicator(currentPage);
    updateMenuActive(currentPage);
  }
}, { passive: true });

// ══════ RENDER WORKS ══════
function renderWorks() {
  const container = document.getElementById('worksList');
  if (!container) return;
  
  let works = JSON.parse(localStorage.getItem(WORKS_KEY) || 'null');
  if (!works) {
    works = DEFAULT_WORKS;
    localStorage.setItem(WORKS_KEY, JSON.stringify(works));
  }
  
  if (works.length === 0) {
    container.innerHTML = '<div class="empty-state" data-zh="暂无作品" data-en="No works yet">暂无作品</div>';
    return;
  }
  
  const tagColors = ['accent','accent2','accent3','purple'];
  
  container.innerHTML = works.map((w, i) => `
    <div class="work-card" onclick="jumpToWork(${i})">
      <div class="work-cover" style="background:linear-gradient(135deg,#1a0a0f,#0a1520)">
        <span class="cover-num">${String(i + 1).padStart(2,'0')}</span>
      </div>
      <div class="work-body">
        <div class="work-top">
          <div class="work-id">SERIAL NO.${w.id || String(i + 1).padStart(3,'0')}</div>
          <div class="work-arrow">↗</div>
        </div>
        <div class="work-title" data-zh="${w.titleZh}" data-en="${w.titleEn}">${w.titleZh}</div>
        <div class="work-about" data-zh="${w.aboutZh}" data-en="${w.aboutEn}">${w.aboutZh}</div>
        <div class="work-tags">
          ${(w.tags || []).slice(0,3).map((t,ti) => `<span class="work-tag ${tagColors[ti]}">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function jumpToWork(index) {
  goToPage(1);
}

// ══════ RENDER WENCHUANG ══════
function renderWenchuang() {
  const container = document.getElementById('wenchuangList');
  if (!container) return;
  
  let items = JSON.parse(localStorage.getItem(WENCHUANG_KEY) || 'null');
  if (!items) {
    items = DEFAULT_WENCHUANG;
    localStorage.setItem(WENCHUANG_KEY, JSON.stringify(items));
  }
  
  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state" data-zh="暂无文创" data-en="No creative works yet">暂无文创</div>';
    return;
  }
  
  const tagColors = ['accent','accent2','accent3','purple'];
  
  container.innerHTML = items.map((w, i) => `
    <div class="work-card">
      <div class="work-cover" style="background:linear-gradient(135deg,#001520,#0a0a1a)">
        <span class="cover-num">${String(i + 1).padStart(2,'0')}</span>
      </div>
      <div class="work-body">
        <div class="work-top">
          <div class="work-id">SERIAL NO.${w.id || String(i + 1).padStart(3,'0')}</div>
          <div class="work-arrow">↗</div>
        </div>
        <div class="work-title" data-zh="${w.titleZh}" data-en="${w.titleEn}">${w.titleZh}</div>
        <div class="work-about" data-zh="${w.aboutZh}" data-en="${w.aboutEn}">${w.aboutZh}</div>
        <div class="work-tags">
          ${(w.tags || []).slice(0,3).map((t,ti) => `<span class="work-tag ${tagColors[ti]}">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

// ══════ RENDER BLOG ══════
function renderBlog() {
  const list = document.getElementById('blogList');
  if (!list) return;
  
  const posts = JSON.parse(localStorage.getItem(BLOG_KEY) || '[]');
  
  if (posts.length === 0) {
    list.innerHTML = '<div class="blog-empty" data-zh="暂无内容，明天见！" data-en="No posts yet, see you tomorrow!">暂无内容，明天见！</div>';
    return;
  }
  
  list.innerHTML = posts.map(post => `
    <div class="blog-post">
      <div class="blog-date">${post.date}</div>
      <div class="blog-title">${post.title}</div>
      <div class="blog-excerpt">${post.excerpt}</div>
    </div>
  `).join('');
  
  // 应用当前语言
  if (currentLang === 'en') {
    document.querySelectorAll('[data-zh][data-en]').forEach(el => {
      const text = el.getAttribute('data-en');
      if (text) el.textContent = text;
    });
  }
}

// ══════ INIT ══════
renderWorks();
renderWenchuang();
renderBlog();

// 初始化语言
document.querySelectorAll('[data-zh][data-en]').forEach(el => {
  el.textContent = el.getAttribute('data-zh');
});
</script>
